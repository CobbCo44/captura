<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CatchCare — Check-in Digest</title>
  <link rel="stylesheet" href="/shared/styles.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/shared/app.js" defer></script>
  <style>
    .urgency-group { margin-bottom: 2rem; }
    .urgency-group h3 { margin-bottom: 0.75rem; }
    .checkin-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem;
      margin-bottom: 0.75rem;
    }
    .checkin-card.escalate { border-left: 4px solid var(--danger); }
    .checkin-card.digest { border-left: 4px solid var(--warning); }
    .checkin-card.log { border-left: 4px solid var(--text-light); }
    .checkin-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .checkin-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }
    .checkin-actions .btn {
      flex: none;
      width: auto;
      padding: 0.375rem 0.75rem;
      font-size: 0.8125rem;
    }
    .checkin-messages {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 0.75rem;
      margin-top: 0.5rem;
      max-height: 200px;
      overflow-y: auto;
      font-size: 0.8125rem;
      display: none;
    }
    .checkin-messages.show { display: block; }
    .checkin-messages .msg {
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }
    .checkin-messages .msg strong {
      color: var(--primary);
    }
  </style>
</head>
<body>

  <section id="login-section" class="auth-screen">
    <div class="auth-card">
      <div class="logo-mark">CC</div>
      <h1>Doctor Login</h1>
      <form id="login-form">
        <div class="form-group">
          <input type="email" class="form-input" placeholder="doctor@practice.com" required>
        </div>
        <button type="submit" class="btn btn-primary">Send Login Link</button>
        <p class="auth-feedback mt-1 text-sm"></p>
      </form>
    </div>
  </section>

  <section id="dashboard-section" class="dashboard hidden">
    <header class="dashboard-header">
      <div class="container container-wide">
        <a href="/doctor/" class="logo" style="text-decoration:none;">CatchCare</a>
        <span id="user-email" class="user-info"></span>
      </div>
    </header>
    <div class="dashboard-body">
      <div class="container container-wide">
        <a href="/doctor/" class="text-sm text-secondary" style="display:inline-flex;align-items:center;gap:0.25rem;margin-bottom:1rem;text-decoration:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          Back to Dashboard
        </a>

        <h2 class="mb-2">Patient Check-in Digest</h2>
        <div id="digest-content">
          <div style="text-align:center;padding:2rem;">
            <div class="spinner" style="margin:0 auto 1rem;"></div>
            <p class="text-secondary">Loading check-ins...</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      setupLoginForm('login-form');
      const user = await requireAuth('doctor');
      if (!user) return;

      const container = document.getElementById('digest-content');

      try {
        const data = await callFunction('doctor-feed', { doctor_email: user.email });
        const checkins = data.checkins || [];

        if (checkins.length === 0) {
          container.innerHTML = '<p class="text-secondary">No patient check-ins to review.</p>';
          return;
        }

        const groups = { escalate: [], digest: [], log: [] };
        checkins.forEach(c => {
          const bucket = groups[c.urgency] || groups.digest;
          bucket.push(c);
        });

        let html = '';

        if (groups.escalate.length > 0) {
          html += renderGroup('Urgent', 'escalate', groups.escalate);
        }
        if (groups.digest.length > 0) {
          html += renderGroup('For Review', 'digest', groups.digest);
        }
        if (groups.log.length > 0) {
          html += renderGroup('Logged', 'log', groups.log);
        }

        container.innerHTML = html;
      } catch (err) {
        console.error('Digest error:', err);
        container.innerHTML = '<p class="text-secondary">Unable to load check-ins.</p>';
      }
    });

    function renderGroup(title, urgency, checkins) {
      const badgeClass = urgency === 'escalate' ? 'badge-danger' : urgency === 'digest' ? 'badge-warning' : 'badge-neutral';

      return `<div class="urgency-group">
        <h3><span class="badge ${badgeClass}">${title}</span> (${checkins.length})</h3>
        ${checkins.map(c => `
          <div class="checkin-card ${urgency}">
            <div class="checkin-meta">
              <strong>${c.patient_name}</strong>
              <span class="text-sm text-secondary">${formatDate(c.created_at)}</span>
            </div>
            <p class="text-sm">${c.summary || 'No summary available'}</p>
            <div class="checkin-actions">
              <button class="btn btn-outline" onclick="toggleMessages('msgs-${c.id}')">View Conversation</button>
              <button class="btn btn-outline" onclick="markReviewed('${c.id}', this)">Mark Reviewed</button>
            </div>
            <div class="checkin-messages" id="msgs-${c.id}">
              ${(c.messages || []).map(m => `<div class="msg"><strong>${m.role === 'user' ? 'Patient' : 'Agent'}:</strong> ${m.content}</div>`).join('')}
            </div>
          </div>
        `).join('')}
      </div>`;
    }

    function toggleMessages(id) {
      const el = document.getElementById(id);
      if (el) el.classList.toggle('show');
    }

    async function markReviewed(checkinId, btn) {
      try {
        const sb = initSupabase();
        // Use service role via direct update won't work from client
        // For now just visually mark it
        btn.textContent = 'Reviewed';
        btn.disabled = true;
        btn.style.opacity = '0.5';
      } catch (err) {
        console.error('Mark reviewed error:', err);
      }
    }
  </script>
</body>
</html>
