<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CatchCare — Doctor Dashboard</title>
  <link rel="stylesheet" href="/shared/styles.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/shared/app.js" defer></script>
</head>
<body>

  <!-- Login Screen -->
  <section id="login-section" class="auth-screen">
    <div class="auth-card">
      <div class="logo-mark">CC</div>
      <h1>Doctor Login</h1>
      <p class="subtitle">Enter your practice email and we'll send you a secure login link.</p>
      <form id="login-form">
        <div class="form-group">
          <input type="email" class="form-input" placeholder="doctor@practice.com" required>
        </div>
        <button type="submit" class="btn btn-primary">Send Login Link</button>
        <p class="auth-feedback mt-1 text-sm"></p>
      </form>
      <a href="/" class="text-sm text-secondary mt-2" style="display:inline-block;">Back to home</a>
    </div>
  </section>

  <!-- Dashboard (shown after auth) -->
  <section id="dashboard-section" class="dashboard hidden">
    <header class="dashboard-header">
      <div class="container container-wide">
        <span class="logo">CatchCare</span>
        <div>
          <span id="user-email" class="user-info"></span>
          <button onclick="signOut()" class="text-sm text-secondary" style="background:none;border:none;cursor:pointer;margin-left:0.5rem;text-decoration:underline;">Sign out</button>
        </div>
      </div>
    </header>
    <div class="dashboard-body">
      <div class="container container-wide">
        <h2 class="mb-2" id="doc-greeting">Your Patients</h2>

        <div class="card mb-2">
          <h3 class="mb-1">Upcoming Visits</h3>
          <div id="visits-list">
            <p class="text-secondary text-sm">Loading...</p>
          </div>
        </div>

        <div class="card mb-2">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
            <h3>Recent Check-ins</h3>
            <a href="/doctor/digest.html" class="text-sm" style="color:var(--primary);">View Full Digest</a>
          </div>
          <div id="checkins-list">
            <p class="text-secondary text-sm">Loading...</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      setupLoginForm('login-form');
      const user = await requireAuth('doctor');
      if (!user) return;

      try {
        const data = await callFunction('doctor-feed', { doctor_email: user.email });

        // Set greeting
        if (data.doctor && data.doctor.name) {
          document.getElementById('doc-greeting').textContent = `Welcome, ${data.doctor.name}`;
        }

        // Render visits
        const visitsEl = document.getElementById('visits-list');
        if (data.visits && data.visits.length > 0) {
          visitsEl.innerHTML = data.visits.map(v => {
            const date = formatDate(v.scheduled_for);
            const time = formatTime(v.scheduled_for);
            const type = v.visit_type === 'initial' ? 'Initial' : 'Follow-up';

            let badge = '';
            if (v.snapshot_ready) {
              badge = '<span class="badge badge-success">Snapshot Ready</span>';
            } else if (v.status === 'intake_complete') {
              badge = '<span class="badge badge-warning">Generating...</span>';
            } else {
              badge = '<span class="badge badge-neutral">Waiting for Intake</span>';
            }

            const link = v.snapshot_ready
              ? `onclick="window.location.href='/doctor/patient.html?visit=${v.id}&snapshot=${v.snapshot_id}'" style="cursor:pointer;"`
              : 'style="cursor:default;"';

            return `<div class="visit-item" ${link}>
              <div>
                <strong>${v.patient_name}</strong>
                <br><span class="text-sm text-secondary">${type} — ${date} at ${time}</span>
              </div>
              ${badge}
            </div>`;
          }).join('');
        } else {
          visitsEl.innerHTML = '<p class="text-secondary text-sm">No upcoming visits.</p>';
        }

        // Render check-ins
        const checkinsEl = document.getElementById('checkins-list');
        if (data.checkins && data.checkins.length > 0) {
          checkinsEl.innerHTML = data.checkins.map(c => {
            const date = formatDate(c.created_at);
            const urgencyClass = c.urgency === 'escalate' ? 'badge-danger'
              : c.urgency === 'digest' ? 'badge-warning' : 'badge-neutral';
            const urgencyLabel = c.urgency === 'escalate' ? 'Urgent'
              : c.urgency === 'digest' ? 'Review' : 'Logged';

            return `<div class="visit-item">
              <div>
                <strong>${c.patient_name}</strong>
                <br><span class="text-sm text-secondary">${c.summary || 'Check-in'} — ${date}</span>
              </div>
              <span class="badge ${urgencyClass}">${urgencyLabel}</span>
            </div>`;
          }).join('');
        } else {
          checkinsEl.innerHTML = '<p class="text-secondary text-sm">No patient check-ins to review.</p>';
        }

      } catch (err) {
        console.error('Dashboard error:', err);
        document.getElementById('visits-list').innerHTML = '<p class="text-secondary text-sm">Unable to load data. Please try again.</p>';
        document.getElementById('checkins-list').innerHTML = '';
      }
    });
  </script>
</body>
</html>
