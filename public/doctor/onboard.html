<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CatchCare — Doctor Setup</title>
  <link rel="stylesheet" href="/shared/styles.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/shared/app.js" defer></script>
</head>
<body>

  <section id="login-section" class="auth-screen">
    <div class="auth-card">
      <div class="logo-mark">CC</div>
      <h1>Doctor Sign Up</h1>
      <p class="subtitle">Create your CatchCare account to start receiving patient snapshots.</p>
      <form id="signup-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" class="form-input" placeholder="doctor@practice.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" class="form-input" placeholder="Choose a password" required minlength="6">
        </div>
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="signup-name" class="form-input" placeholder="Dr. Smith" required>
        </div>
        <div class="form-group">
          <label>Practice Name</label>
          <input type="text" id="signup-practice" class="form-input" placeholder="Smith Family Medicine">
        </div>
        <div class="form-group">
          <label>Specialty</label>
          <input type="text" id="signup-specialty" class="form-input" placeholder="e.g. Family Medicine, Functional Medicine">
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
        <p class="auth-feedback mt-1 text-sm" id="signup-feedback"></p>
      </form>
      <p class="text-sm text-secondary mt-2">Already have an account? <a href="/doctor/" style="color:var(--primary);">Sign in</a></p>
    </div>
  </section>

  <script>
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const name = document.getElementById('signup-name').value.trim();
      const practice = document.getElementById('signup-practice').value.trim();
      const specialty = document.getElementById('signup-specialty').value.trim();
      const feedback = document.getElementById('signup-feedback');
      const btn = e.target.querySelector('button[type="submit"]');

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const result = await callFunction('doctor-onboard', {
          email, password, name, practice_name: practice, specialty,
        });

        if (result.error) {
          feedback.textContent = result.error;
          feedback.style.color = 'var(--danger)';
          btn.disabled = false;
          btn.textContent = 'Create Account';
        } else {
          feedback.textContent = 'Account created! Signing you in...';
          feedback.style.color = 'var(--success)';

          // Auto sign in
          const sb = initSupabase();
          await sb.auth.signInWithPassword({ email, password });
          window.location.href = '/doctor/';
        }
      } catch (err) {
        feedback.textContent = err.message || 'Something went wrong.';
        feedback.style.color = 'var(--danger)';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
