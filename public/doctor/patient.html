<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CatchCare — Patient Snapshot</title>
  <link rel="stylesheet" href="/shared/styles.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/shared/app.js" defer></script>
  <style>
    .snapshot { max-width: 720px; margin: 0 auto; }

    .snap-header {
      text-align: center;
      padding: 1.5rem 0 1rem;
      border-bottom: 2px solid var(--primary);
      margin-bottom: 1.5rem;
    }
    .snap-header h2 {
      font-size: 1.25rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--primary-dark);
    }
    .snap-meta {
      font-size: 0.8125rem;
      color: var(--text-light);
      font-style: italic;
      margin-top: 0.25rem;
    }

    .snap-patient-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      background: var(--accent);
      padding: 1rem;
      border-radius: var(--radius-sm);
      margin-bottom: 1.5rem;
      font-size: 0.9375rem;
    }

    .snap-section {
      margin-bottom: 1.5rem;
    }
    .snap-section h3 {
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--primary);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.375rem;
      margin-bottom: 0.75rem;
    }
    .snap-section p,
    .snap-section li {
      font-size: 0.9375rem;
      line-height: 1.6;
      color: var(--text);
    }
    .snap-section ul {
      list-style: disc;
      padding-left: 1.25rem;
    }
    .snap-section li {
      margin-bottom: 0.375rem;
    }

    .snap-considerations {
      background: #FFF8F0;
      border: 1px solid #F0D9B5;
      border-radius: var(--radius-sm);
      padding: 1rem;
    }
    .snap-considerations h3 {
      color: var(--warning);
      border-bottom-color: #F0D9B5;
    }
    .snap-warning {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      font-style: italic;
      margin-bottom: 0.75rem;
    }

    .snap-actions {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .snap-actions .btn {
      flex: 1;
      padding: 0.625rem 1rem;
      font-size: 0.875rem;
    }

    @media print {
      .dashboard-header, .snap-actions, .back-link { display: none !important; }
      .snapshot { max-width: 100%; }
      .snap-considerations { break-inside: avoid; }
    }

    @media (max-width: 480px) {
      .snap-patient-info { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <section id="login-section" class="auth-screen">
    <div class="auth-card">
      <div class="logo-mark">CC</div>
      <h1>Doctor Login</h1>
      <p class="subtitle">Enter your practice email to view patient snapshots.</p>
      <form id="login-form">
        <div class="form-group">
          <input type="email" class="form-input" placeholder="doctor@practice.com" required>
        </div>
        <button type="submit" class="btn btn-primary">Send Login Link</button>
        <p class="auth-feedback mt-1 text-sm"></p>
      </form>
    </div>
  </section>

  <section id="dashboard-section" class="dashboard hidden">
    <header class="dashboard-header">
      <div class="container container-wide">
        <a href="/doctor/" class="logo" style="text-decoration:none;">CatchCare</a>
        <span id="user-email" class="user-info"></span>
      </div>
    </header>
    <div class="dashboard-body">
      <div class="container container-wide">
        <a href="/doctor/" class="back-link text-sm text-secondary" style="display:inline-flex;align-items:center;gap:0.25rem;margin-bottom:1rem;text-decoration:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          Back to Dashboard
        </a>

        <div class="snap-actions">
          <button class="btn btn-outline" onclick="window.print()">Print / Save PDF</button>
          <button class="btn btn-outline" id="copy-btn" onclick="copySnapshot()">Copy to Clipboard</button>
          <button class="btn btn-outline" onclick="exportForChart()">Export for Chart</button>
          <button class="btn btn-outline" id="complete-btn" onclick="markVisitComplete()">Mark Visit Complete</button>
        </div>

        <!-- Schedule Follow-up -->
        <div class="card mb-2 hidden" id="followup-section" style="border-left:4px solid var(--primary-light);">
          <h3 class="mb-1">Schedule Follow-up</h3>
          <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:flex-end;">
            <div class="form-group" style="flex:1;min-width:180px;margin:0;">
              <label class="text-sm text-secondary">Date and time</label>
              <input type="datetime-local" id="followup-date" class="form-input">
            </div>
            <button class="btn btn-primary" onclick="scheduleFollowup()" style="width:auto;padding:0.625rem 1rem;">Schedule</button>
          </div>
          <p class="text-sm mt-1" id="followup-feedback"></p>
        </div>

        <div id="snapshot-container">
          <div style="text-align:center;padding:3rem;">
            <div class="spinner" style="margin:0 auto 1rem;"></div>
            <p class="text-secondary">Loading snapshot...</p>
          </div>
        </div>

        <!-- Protocol Builder -->
        <div class="card mt-3" id="protocol-section" style="display:none;">
          <h3 class="mb-1" style="display:flex;justify-content:space-between;align-items:center;">
            Patient Protocol
            <span class="text-sm text-secondary" id="protocol-saved-indicator"></span>
          </h3>
          <div id="current-protocol"></div>
          <div class="form-group mt-1">
            <label>Medications</label>
            <textarea id="proto-meds" class="form-input" rows="2" placeholder="e.g. Testosterone cypionate 100mg 2x/week IM" style="font-family:inherit;"></textarea>
          </div>
          <div class="form-group">
            <label>Supplements</label>
            <textarea id="proto-supps" class="form-input" rows="2" placeholder="e.g. Vitamin D3 5000IU daily, Magnesium 400mg nightly" style="font-family:inherit;"></textarea>
          </div>
          <div class="form-group">
            <label>Instructions</label>
            <textarea id="proto-instructions" class="form-input" rows="2" placeholder="e.g. Recheck labs in 6 weeks, walk 30 min daily" style="font-family:inherit;"></textarea>
          </div>
          <button class="btn btn-primary" onclick="saveProtocol()" style="max-width:200px;">Save Protocol</button>
        </div>

        <!-- Doctor's Notes -->
        <div class="card mt-3" id="doctor-notes-section" style="display:none;">
          <h3 class="mb-1" style="display:flex;justify-content:space-between;align-items:center;">
            Doctor's Notes
            <span class="text-sm text-secondary" id="notes-saved-indicator"></span>
          </h3>
          <div id="past-notes"></div>
          <textarea id="new-note" class="form-input" rows="3" placeholder="Add a note about this patient..." style="margin-top:0.75rem;font-family:inherit;"></textarea>
          <button class="btn btn-primary mt-1" id="save-note-btn" onclick="saveNote()" style="max-width:160px;">Save Note</button>
        </div>
      </div>
    </div>
  </section>

  <script>
    const params = new URLSearchParams(window.location.search);
    const snapshotId = params.get('snapshot');
    const visitId = params.get('visit');

    document.addEventListener('DOMContentLoaded', async () => {
      setupLoginForm('login-form');
      const user = await requireAuth('doctor');
      if (!user) return;

      const container = document.getElementById('snapshot-container');

      try {
        const sb = initSupabase();

        // Try to get snapshot by ID first, then by visit_id
        let snapshot;
        if (snapshotId) {
          const { data, error } = await sb
            .from('snapshots')
            .select('*')
            .eq('id', snapshotId)
            .single();
          // Service role needed for doctor access — use the function instead
        }

        // Use service role via function for doctor access
        const res = await fetch('/.netlify/functions/doctor-feed', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ doctor_email: user.email, get_snapshot: visitId })
        });

        // For now, fetch the rendered HTML directly from the snapshots table
        // via a dedicated endpoint. Let's use the snapshot data from the feed.
        const feedData = await callFunction('get-snapshot', { visit_id: visitId, snapshot_id: snapshotId });

        container.innerHTML = feedData.rendered_html;

        // Show doctor notes and protocol sections
        document.getElementById('doctor-notes-section').style.display = '';
        document.getElementById('protocol-section').style.display = '';
        loadNotes();
        loadProtocol();

      } catch (err) {
        console.error('Snapshot load error:', err);
        container.innerHTML = `
          <div style="text-align:center;padding:3rem;">
            <p class="text-secondary">Snapshot not available yet. It may still be generating.</p>
            <a href="/doctor/" class="btn btn-outline mt-2" style="max-width:200px;margin:1rem auto 0;">Back to Dashboard</a>
          </div>`;
      }
    });

    function copySnapshot() {
      const container = document.getElementById('snapshot-container');
      const text = container.innerText;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy to Clipboard', 2000);
      });
    }

    async function loadNotes() {
      try {
        const data = await callFunction('doctor-notes', { visit_id: visitId, action: 'list' });
        const container = document.getElementById('past-notes');
        if (data.notes && data.notes.length > 0) {
          container.innerHTML = data.notes.map(n => `
            <div style="padding:0.75rem 0;border-bottom:1px solid var(--border);">
              <p style="font-size:0.9375rem;margin:0;">${escapeHtml(n.note)}</p>
              <span class="text-sm text-secondary">${formatDate(n.created_at)} at ${formatTime(n.created_at)}</span>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<p class="text-sm text-secondary">No notes yet.</p>';
        }
      } catch (err) {
        console.error('Load notes error:', err);
      }
    }

    async function saveNote() {
      const textarea = document.getElementById('new-note');
      const note = textarea.value.trim();
      if (!note) return;

      const btn = document.getElementById('save-note-btn');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      try {
        await callFunction('doctor-notes', { visit_id: visitId, action: 'add', note });
        textarea.value = '';
        const indicator = document.getElementById('notes-saved-indicator');
        indicator.textContent = 'Saved';
        indicator.style.color = 'var(--success)';
        setTimeout(() => indicator.textContent = '', 2000);
        loadNotes();
      } catch (err) {
        console.error('Save note error:', err);
      }

      btn.disabled = false;
      btn.textContent = 'Save Note';
    }

    async function loadProtocol() {
      try {
        const data = await callFunction('get-protocol', { visit_id: visitId });
        if (data.protocol) {
          const p = data.protocol;
          document.getElementById('proto-meds').value = p.medications || '';
          document.getElementById('proto-supps').value = p.supplements || '';
          document.getElementById('proto-instructions').value = p.instructions || '';
          document.getElementById('current-protocol').innerHTML =
            '<p class="text-sm text-secondary mb-1">Current protocol loaded. Edit and save to update.</p>';
        } else {
          document.getElementById('current-protocol').innerHTML =
            '<p class="text-sm text-secondary mb-1">No protocol set yet. Add one below.</p>';
        }
      } catch (err) {
        console.error('Load protocol error:', err);
      }
    }

    async function saveProtocol() {
      const protocol = {
        medications: document.getElementById('proto-meds').value.trim(),
        supplements: document.getElementById('proto-supps').value.trim(),
        instructions: document.getElementById('proto-instructions').value.trim(),
      };

      try {
        const user = await getUser();
        await callFunction('update-protocol', {
          patient_id: null, // will be resolved from visit_id
          visit_id: visitId,
          doctor_email: user.email,
          protocol,
        });
        const indicator = document.getElementById('protocol-saved-indicator');
        indicator.textContent = 'Saved';
        indicator.style.color = 'var(--success)';
        setTimeout(() => indicator.textContent = '', 2000);
      } catch (err) {
        console.error('Save protocol error:', err);
      }
    }

    async function exportForChart() {
      try {
        const data = await callFunction('get-snapshot', { visit_id: visitId, snapshot_id: snapshotId });
        const s = data.content;
        if (!s) { showToast('No snapshot data to export'); return; }

        const lines = [
          '═══════════════════════════════════════════════',
          'PRE-VISIT CLINICAL SNAPSHOT',
          'Generated by CatchCare | Decision support, not a diagnostic instrument',
          '═══════════════════════════════════════════════',
          '',
          `Patient: ${s.patient_name || 'N/A'}`,
          `DOB: ${s.dob || 'N/A'}`,
          `Visit Type: ${s.visit_type || 'N/A'}`,
          `Patient Goal: ${s.patient_goal || 'N/A'}`,
          `Date: ${new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}`,
          '',
        ];

        const addSection = (title, content) => {
          if (!content || content === 'Not discussed during intake.') return;
          lines.push('───────────────────────────────────────────────');
          lines.push(title.toUpperCase());
          lines.push('───────────────────────────────────────────────');
          content.split('\\n').join('\n').split('\n').forEach(l => {
            if (l.trim()) lines.push('  ' + l.trim());
          });
          lines.push('');
        };

        addSection('Since Last Visit', s.since_last_visit);
        addSection('Chief Complaint', s.chief_complaint);
        addSection('Symptom Timeline', s.symptom_timeline);
        addSection('Current Protocol', s.current_protocol);
        addSection("What's Been Tried", s.whats_been_tried);
        addSection('Relevant History', s.relevant_history);
        addSection('Lab Summary', s.lab_summary);
        addSection('Considerations for Physician Review', s.considerations);
        addSection('Between-Visits Log', s.between_visits_log);

        lines.push('═══════════════════════════════════════════════');
        lines.push('End of CatchCare Snapshot');
        lines.push('═══════════════════════════════════════════════');

        const text = lines.join('\n');

        // Offer both copy and download
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `CatchCare_Snapshot_${(s.patient_name || 'Patient').replace(/\s+/g, '_')}_${new Date().toISOString().split('T')[0]}.txt`;
        a.click();
        URL.revokeObjectURL(url);

        // Also copy to clipboard
        await navigator.clipboard.writeText(text);
        showToast('Snapshot exported and copied to clipboard');
      } catch (err) {
        console.error('Export error:', err);
        showToast('Export failed');
      }
    }

    async function markVisitComplete() {
      const btn = document.getElementById('complete-btn');
      btn.disabled = true;
      btn.textContent = 'Completing...';
      try {
        await callFunction('visit-action', { visit_id: visitId, action: 'complete' });
        btn.textContent = 'Visit Completed';
        btn.style.background = 'var(--success)';
        btn.style.color = 'white';
        btn.style.borderColor = 'var(--success)';
        // Show follow-up scheduling
        document.getElementById('followup-section').classList.remove('hidden');
      } catch (err) {
        console.error('Complete error:', err);
        btn.disabled = false;
        btn.textContent = 'Mark Visit Complete';
      }
    }

    async function scheduleFollowup() {
      const dateVal = document.getElementById('followup-date').value;
      if (!dateVal) return;
      const feedback = document.getElementById('followup-feedback');
      try {
        const user = await getUser();
        await callFunction('visit-action', {
          visit_id: visitId,
          action: 'schedule-followup',
          scheduled_for: dateVal,
          doctor_email: user.email,
        });
        feedback.textContent = 'Follow-up scheduled! The patient will see it on their dashboard.';
        feedback.style.color = 'var(--success)';
      } catch (err) {
        feedback.textContent = 'Failed to schedule.';
        feedback.style.color = 'var(--danger)';
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
  <script src="/shared/doctor-agent.js" defer></script>
</body>
</html>
