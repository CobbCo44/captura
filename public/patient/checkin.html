<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CatchCare — Check-in</title>
  <link rel="stylesheet" href="/shared/styles.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/shared/app.js" defer></script>
  <style>
    body {
      background: var(--bg);
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .chat-header .logo { font-weight: 700; color: var(--primary); font-size: 1rem; }
    .chat-header .visit-info { font-size: 0.8125rem; color: var(--text-secondary); }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      -webkit-overflow-scrolling: touch;
    }
    .chat-welcome {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-secondary);
    }
    .chat-welcome .logo-mark {
      width: 48px; height: 48px; font-size: 1.125rem; margin: 0 auto 0.75rem;
    }
    .chat-welcome h3 { color: var(--text); margin-bottom: 0.375rem; }
    .chat-welcome p { font-size: 0.875rem; max-width: 300px; margin: 0 auto; line-height: 1.5; }
    .message {
      max-width: 85%; padding: 0.75rem 1rem; border-radius: 1rem;
      font-size: 0.9375rem; line-height: 1.5; animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message-agent {
      align-self: flex-start; background: var(--surface);
      border: 1px solid var(--border); border-bottom-left-radius: 4px;
    }
    .message-patient {
      align-self: flex-end; background: var(--primary);
      color: white; border-bottom-right-radius: 4px;
    }
    .message-typing {
      align-self: flex-start; background: var(--surface);
      border: 1px solid var(--border); border-bottom-left-radius: 4px;
      padding: 0.75rem 1.25rem;
    }
    .typing-dots { display: flex; gap: 4px; align-items: center; }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-light); animation: typingBounce 1.4s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
    .chat-input-bar {
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 0.75rem 1rem; display: flex; gap: 0.5rem;
      align-items: flex-end; flex-shrink: 0;
    }
    .chat-input-bar textarea {
      flex: 1; border: 1px solid var(--border); border-radius: 1.25rem;
      padding: 0.625rem 1rem; font-size: 1rem; font-family: inherit;
      resize: none; max-height: 120px; line-height: 1.4; outline: none;
    }
    .chat-input-bar textarea:focus { border-color: var(--primary-light); }
    .chat-send-btn {
      width: 42px; height: 42px; border-radius: 50%; background: var(--primary);
      color: white; border: none; cursor: pointer; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    .chat-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .chat-send-btn svg { width: 18px; height: 18px; }
    .chat-complete { text-align: center; padding: 1.5rem 1rem; }
    .chat-complete .badge { margin-bottom: 0.75rem; display: inline-flex; }
    .chat-complete p { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 1rem; }
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .chat-input-bar { padding-bottom: calc(0.75rem + env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>

  <header class="chat-header">
    <a href="/patient/" style="text-decoration:none;display:flex;align-items:center;gap:0.5rem;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-secondary)"><path d="M15 18l-6-6 6-6"/></svg>
      <span class="logo">CatchCare</span>
    </a>
    <span class="visit-info">Between-Visit Check-in</span>
  </header>

  <div class="chat-messages" id="chat-messages">
    <div class="chat-welcome">
      <div class="logo-mark">CC</div>
      <h3>Between-visit check-in</h3>
      <p>Log how things are going so your doctor stays in the loop between appointments.</p>
    </div>
  </div>

  <div class="chat-input-bar" id="chat-input-bar">
    <textarea id="chat-input" rows="1" placeholder="Type your update..." autofocus></textarea>
    <button class="chat-send-btn" id="send-btn" aria-label="Send message">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

  <div class="chat-complete hidden" id="chat-complete">
    <span class="badge badge-success">Check-in Complete</span>
    <p>Your update has been logged and your doctor will be able to review it.</p>
    <a href="/patient/" class="btn btn-primary" style="max-width:280px;margin:0 auto;">Back to Dashboard</a>
  </div>

  <script>
    let conversationHistory = [];
    let isWaitingForAgent = false;
    let currentCheckinId = null;
    let userEmail = null;

    const messagesEl = document.getElementById('chat-messages');
    const inputEl = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const inputBar = document.getElementById('chat-input-bar');
    const completeEl = document.getElementById('chat-complete');

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    sendBtn.addEventListener('click', sendMessage);

    function addMessage(text, role) {
      const welcome = messagesEl.querySelector('.chat-welcome');
      if (welcome) welcome.remove();
      const div = document.createElement('div');
      div.className = `message message-${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message message-typing';
      div.id = 'typing-indicator';
      div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function showComplete() {
      inputBar.classList.add('hidden');
      completeEl.classList.remove('hidden');
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isWaitingForAgent) return;

      addMessage(text, 'patient');
      conversationHistory.push({ role: 'user', content: text });
      inputEl.value = '';
      inputEl.style.height = 'auto';

      isWaitingForAgent = true;
      sendBtn.disabled = true;
      showTyping();

      try {
        const response = await callFunction('checkin-conversation', {
          checkin_id: currentCheckinId,
          patient_message: text,
          conversation_history: conversationHistory,
          patient_email: userEmail,
        });

        hideTyping();
        addMessage(response.agent_message, 'agent');
        conversationHistory.push({ role: 'assistant', content: response.agent_message });

        if (response.checkin_id) currentCheckinId = response.checkin_id;

        if (response.conversation_complete) {
          showComplete();
          return;
        }
      } catch (err) {
        hideTyping();
        addMessage('Something went wrong. Please try again.', 'agent');
        console.error('Check-in error:', err);
      }

      isWaitingForAgent = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const user = await requireAuth('patient');
      if (!user) return;
      userEmail = user.email;

      const loginSection = document.getElementById('login-section');
      if (loginSection) loginSection.classList.add('hidden');

      showTyping();
      try {
        const response = await callFunction('checkin-conversation', {
          checkin_id: null,
          patient_message: '',
          conversation_history: [],
          patient_email: userEmail,
        });
        hideTyping();
        addMessage(response.agent_message, 'agent');
        conversationHistory.push({ role: 'assistant', content: response.agent_message });
        if (response.checkin_id) currentCheckinId = response.checkin_id;
      } catch (err) {
        hideTyping();
        addMessage('Having trouble connecting. Please refresh and try again.', 'agent');
        console.error('Init error:', err);
      }
    });
  </script>
</body>
</html>
