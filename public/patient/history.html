<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CatchCare — My History</title>
  <link rel="stylesheet" href="/shared/styles.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/shared/app.js" defer></script>
  <style>
    .timeline-item {
      position: relative;
      padding: 1rem;
      padding-left: 2rem;
      border-left: 2px solid var(--border);
      margin-left: 0.5rem;
    }
    .timeline-item:last-child { border-left-color: transparent; }
    .timeline-dot {
      position: absolute;
      left: -7px;
      top: 1.25rem;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--primary);
      border: 2px solid var(--surface);
    }
    .timeline-dot.checkin { background: var(--primary-light); }
    .timeline-dot.lab { background: var(--success); }
    .timeline-date {
      font-size: 0.75rem;
      color: var(--text-light);
      margin-bottom: 0.25rem;
    }
    .timeline-title {
      font-weight: 600;
      font-size: 0.9375rem;
      margin-bottom: 0.25rem;
    }
    .timeline-body {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .convo-toggle {
      font-size: 0.8125rem;
      color: var(--primary);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      margin-top: 0.375rem;
    }
    .convo-messages {
      display: none;
      margin-top: 0.5rem;
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 0.75rem;
      font-size: 0.8125rem;
      max-height: 300px;
      overflow-y: auto;
    }
    .convo-messages.show { display: block; }
    .convo-msg { margin-bottom: 0.5rem; line-height: 1.4; }
    .convo-msg strong { color: var(--primary); }
    .doctor-reply {
      background: var(--accent);
      border-left: 3px solid var(--primary);
      padding: 0.5rem 0.75rem;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin-top: 0.5rem;
      font-size: 0.875rem;
    }
    .doctor-reply strong { color: var(--primary-dark); }
  </style>
</head>
<body>

  <section id="login-section" class="auth-screen">
    <div class="auth-card">
      <div class="logo-mark">CC</div>
      <h1>Patient Login</h1>
      <form id="login-form">
        <div class="form-group">
          <input type="email" class="form-input" placeholder="your@email.com" required>
        </div>
        <button type="submit" class="btn btn-primary">Send Login Link</button>
        <p class="auth-feedback mt-1 text-sm"></p>
      </form>
    </div>
  </section>

  <section id="dashboard-section" class="dashboard hidden">
    <header class="dashboard-header">
      <div class="container">
        <a href="/patient/" class="logo" style="text-decoration:none;">CatchCare</a>
        <span id="user-email" class="user-info"></span>
      </div>
    </header>
    <div class="dashboard-body">
      <div class="container">
        <a href="/patient/" class="text-sm text-secondary" style="display:inline-flex;align-items:center;gap:0.25rem;margin-bottom:1rem;text-decoration:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          Back to Dashboard
        </a>
        <h2 class="mb-2">My History</h2>
        <div id="timeline">
          <div style="text-align:center;padding:2rem;">
            <div class="spinner" style="margin:0 auto 1rem;"></div>
            <p class="text-secondary">Loading your history...</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      setupLoginForm('login-form');
      const user = await requireAuth('patient');
      if (!user) return;

      const timeline = document.getElementById('timeline');

      try {
        const data = await callFunction('patient-history', { patient_email: user.email });
        const items = data.items || [];

        if (items.length === 0) {
          timeline.innerHTML = '<p class="text-secondary">No history yet. Complete an intake or check-in to see your timeline.</p>';
          return;
        }

        timeline.innerHTML = items.map(item => {
          const dotClass = item.type === 'checkin' ? 'checkin' : item.type === 'lab' ? 'lab' : '';
          const icon = item.type === 'intake' ? 'Pre-Visit Intake' : item.type === 'checkin' ? 'Check-in' : 'Lab Upload';

          let body = `<p class="timeline-body">${escapeHtml(item.summary || '')}</p>`;

          if (item.messages && item.messages.length > 0) {
            const msgId = 'msgs-' + item.id;
            body += `<button class="convo-toggle" onclick="document.getElementById('${msgId}').classList.toggle('show')">View conversation</button>`;
            body += `<div class="convo-messages" id="${msgId}">`;
            body += item.messages.map(m => `<div class="convo-msg"><strong>${m.role === 'user' ? 'You' : 'CatchCare'}:</strong> ${escapeHtml(m.content)}</div>`).join('');
            body += '</div>';
          }

          if (item.doctor_reply) {
            body += `<div class="doctor-reply"><strong>Dr. replied:</strong> ${escapeHtml(item.doctor_reply)}</div>`;
          }

          return `<div class="timeline-item">
            <div class="timeline-dot ${dotClass}"></div>
            <div class="timeline-date">${formatDate(item.date)} at ${formatTime(item.date)}</div>
            <div class="timeline-title">${icon}</div>
            ${body}
          </div>`;
        }).join('');

      } catch (err) {
        console.error('History error:', err);
        timeline.innerHTML = '<p class="text-secondary">Unable to load history.</p>';
      }
    });

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
