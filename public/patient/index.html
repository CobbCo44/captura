<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CatchCare — Patient Portal</title>
  <link rel="stylesheet" href="/shared/styles.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/shared/app.js" defer></script>
</head>
<body>

  <!-- Login Screen -->
  <section id="login-section" class="auth-screen">
    <div class="auth-card">
      <div class="logo-mark">CC</div>
      <h1>Patient Login</h1>
      <p class="subtitle">Enter your email and we'll send you a secure login link. No password needed.</p>
      <form id="login-form">
        <div class="form-group">
          <input type="email" class="form-input" placeholder="your@email.com" required>
        </div>
        <button type="submit" class="btn btn-primary">Send Login Link</button>
        <p class="auth-feedback mt-1 text-sm"></p>
      </form>
      <a href="/" class="text-sm text-secondary mt-2" style="display:inline-block;">Back to home</a>
    </div>
  </section>

  <!-- Dashboard (shown after auth) -->
  <section id="dashboard-section" class="dashboard hidden">
    <header class="dashboard-header">
      <div class="container container-wide">
        <span class="logo">CatchCare</span>
        <div>
          <span id="user-email" class="user-info"></span>
          <button onclick="signOut()" class="text-sm text-secondary" style="background:none;border:none;cursor:pointer;margin-left:0.5rem;text-decoration:underline;">Sign out</button>
        </div>
      </div>
    </header>
    <div class="dashboard-body">
      <div class="container">
        <h2 class="mb-2">Welcome back</h2>

        <div class="card mb-2" id="visits-card">
          <h3 class="mb-1">Upcoming Visits</h3>
          <div id="visits-list">
            <p class="text-secondary text-sm">Loading...</p>
          </div>
        </div>

        <div class="card mb-2">
          <h3 class="mb-1">Quick Actions</h3>
          <div class="gap-1">
            <a href="/patient/intake.html" class="btn btn-primary" id="start-intake-btn" style="display:none;">Start Pre-Visit Intake</a>
            <a href="/patient/checkin.html" class="btn btn-outline">Start a Check-in</a>
            <a href="/patient/labs.html" class="btn btn-outline">Upload Lab Results</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      setupLoginForm('login-form');
      const user = await requireAuth('patient');
      if (!user) return;

      // Load upcoming visits for this patient
      try {
        const sb = initSupabase();
        const { data: patient } = await sb
          .from('patients')
          .select('id')
          .eq('email', user.email)
          .single();

        if (patient) {
          const { data: visits } = await sb
            .from('visits')
            .select('id, scheduled_for, visit_type, status')
            .eq('patient_id', patient.id)
            .in('status', ['scheduled', 'intake_complete'])
            .order('scheduled_for', { ascending: true });

          const listEl = document.getElementById('visits-list');
          const intakeBtn = document.getElementById('start-intake-btn');

          if (visits && visits.length > 0) {
            listEl.innerHTML = visits.map(v => {
              const date = formatDate(v.scheduled_for);
              const type = v.visit_type === 'initial' ? 'Initial Visit' : 'Follow-up';
              const statusLabel = v.status === 'intake_complete'
                ? '<span class="badge badge-success">Intake Done</span>'
                : '<span class="badge badge-warning">Intake Needed</span>';
              return `<div class="visit-item" style="cursor:default;">
                <div><strong>${type}</strong><br><span class="text-sm text-secondary">${date}</span></div>
                ${statusLabel}
              </div>`;
            }).join('');

            // Show intake button for first visit that needs intake
            const needsIntake = visits.find(v => v.status === 'scheduled');
            if (needsIntake) {
              intakeBtn.href = `/patient/intake.html?visit=${needsIntake.id}`;
              intakeBtn.style.display = '';
            }
          } else {
            listEl.innerHTML = '<p class="text-secondary text-sm">No visits scheduled yet. Your doctor will set one up for you.</p>';
          }
        } else {
          document.getElementById('visits-list').innerHTML = '<p class="text-secondary text-sm">No visits scheduled yet. Your doctor will set one up for you.</p>';
        }
      } catch (err) {
        console.error('Error loading visits:', err);
        document.getElementById('visits-list').innerHTML = '<p class="text-secondary text-sm">No visits scheduled yet. Your doctor will set one up for you.</p>';
      }
    });
  </script>
</body>
</html>
